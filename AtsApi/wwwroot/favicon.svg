<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Candeo mark — Aegean shield + torch flame (I shine) -->
  <defs>
    <linearGradient id="navy" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2c5282"/>
      <stop offset="0.55" stop-color="#1a365d"/>
      <stop offset="1" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="gold" x1="18" y1="6" x2="30" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8c547"/>
      <stop offset="0.5" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#8a6d1a"/>
    </linearGradient>
    <linearGradient id="flame" x1="24" y1="8" x2="24" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff6d6"/>
      <stop offset="0.45" stop-color="#e8c547"/>
      <stop offset="1" stop-color="#c9a227"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M24 3.5L40 10.2v12.4c0 9.6-6.4 16.8-16 20.4C14.4 39.4 8 32.2 8 22.6V10.2L24 3.5z"
        fill="url(#navy)" stroke="#c9a227" stroke-width="1.4"/>
  <!-- Inner rim -->
  <path d="M24 7.2L36.5 12.4v9.8c0 7.6-5 13.4-12.5 16.4C16.5 35.6 11.5 29.8 11.5 22.2v-9.8L24 7.2z"
        fill="none" stroke="rgba(232,197,71,0.35)" stroke-width="0.8"/>
  <!-- Torch stem -->
  <rect x="22.2" y="22" width="3.6" height="12" rx="1.2" fill="url(#gold)"/>
  <!-- Torch cup -->
  <path d="M18.5 22h11l-1.2 3.2H19.7L18.5 22z" fill="url(#gold)"/>
  <!-- Flame -->
  <path d="M24 9.5c2.8 2.2 4.6 4.4 4.6 7.2 0 2.6-2 4.6-4.6 4.6s-4.6-2-4.6-4.6c0-2.8 1.8-5 4.6-7.2z"
        fill="url(#flame)"/>
  <path d="M24 13.2c1.2 1 2 2 2 3.4 0 1.2-.9 2.1-2 2.1s-2-.9-2-2.1c0-1.4.8-2.4 2-3.4z"
        fill="#fff8e6" opacity="0.85"/>
</svg>
